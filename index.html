<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>French Practice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --clr-bg: #f0f4ff;
      --clr-surface: #ffffff;
      --clr-primary: #4f46e5;
      --clr-primary-dark: #3730a3;
      --clr-verb: #7c3aed;
      --clr-verb-bg: #ede9fe;
      --clr-verb-border: #c4b5fd;
      --clr-noun: #0369a1;
      --clr-noun-bg: #e0f2fe;
      --clr-noun-border: #7dd3fc;
      --clr-adverb: #065f46;
      --clr-adverb-bg: #d1fae5;
      --clr-adverb-border: #6ee7b7;
      --clr-adj: #92400e;
      --clr-adj-bg: #fef3c7;
      --clr-adj-border: #fcd34d;
    }

    * { box-sizing: border-box; }
    body { background: var(--clr-bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 0; }

    /* Card flip */
    .card-inner { transition: transform 0.55s cubic-bezier(.4,0,.2,1); transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
    .card.flipped .card-inner { transform: rotateY(180deg); }
    .card-face { -webkit-backface-visibility: hidden; backface-visibility: hidden; position: absolute; inset: 0; border-radius: 16px; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .card-back-face { transform: rotateY(180deg); }

    /* Lesson content */
    .lesson-content h3 { font-weight: 700; font-size: 1.1rem; margin: 1.2rem 0 0.5rem; color: #1e1b4b; }
    .lesson-content p { margin-bottom: 0.75rem; line-height: 1.65; color: #374151; }
    .lesson-content ul, .lesson-content ol { margin-left: 1.5rem; margin-bottom: 1rem; color: #374151; }
    .lesson-content li { margin-bottom: 0.35rem; }
    .lesson-content strong { color: #4f46e5; }
    .word-cols { columns: 2; column-gap: 2rem; }
    @media(min-width:480px){ .word-cols { columns: 3; } }

    /* Highlighted words */
    .hl-verb   { background: var(--clr-verb-bg);   color: var(--clr-verb);   border: 1px solid var(--clr-verb-border);   border-radius: 4px; padding: 1px 5px; cursor: pointer; display: inline-block; }
    .hl-noun   { background: var(--clr-noun-bg);   color: var(--clr-noun);   border: 1px solid var(--clr-noun-border);   border-radius: 4px; padding: 1px 5px; cursor: pointer; display: inline-block; }
    .hl-adverb { background: var(--clr-adverb-bg); color: var(--clr-adverb); border: 1px solid var(--clr-adverb-border); border-radius: 4px; padding: 1px 5px; cursor: pointer; display: inline-block; }
    .hl-adj    { background: var(--clr-adj-bg);    color: var(--clr-adj);    border: 1px solid var(--clr-adj-border);    border-radius: 4px; padding: 1px 5px; cursor: pointer; display: inline-block; }

    /* Word pill in sidebar */
    .word-pill { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; border-radius: 8px; margin-bottom: 6px; font-size: 0.8rem; gap: 8px; }
    .word-pill .fr { font-weight: 600; }
    .word-pill .en { color: #6b7280; font-size: 0.75rem; }
    .word-pill .add-btn { font-size: 0.7rem; padding: 2px 8px; border-radius: 6px; border: none; cursor: pointer; white-space: nowrap; font-weight: 600; transition: opacity 0.2s; }
    .word-pill .add-btn:hover { opacity: 0.8; }
    .word-pill.added { opacity: 0.5; }

    /* Textarea & Editor */
    textarea { resize: none; outline: none; width: 100%; border: 1.5px solid #e5e7eb; border-radius: 12px; padding: 14px; font-size: 1rem; font-family: inherit; line-height: 1.6; transition: border-color 0.2s; }
    textarea:focus { border-color: #4f46e5; }
    [contenteditable=true]:empty:before { content: attr(placeholder); color: #9ca3af; pointer-events: none; display: block; }

    /* Smooth hide/show */
    .view { display: none; }
    .view.active { display: flex; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 22px; height: 22px; border: 3px solid #c4b5fd; border-top-color: #7c3aed; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }

    /* Mobile tweaks */
    @media(max-width: 640px) {
      .analyser-layout { flex-direction: column !important; }
      .sidebar-panel { max-height: 280px; overflow-y: auto; }
    }

    /* Tooltip */
    .tooltip { position: relative; }
    .tooltip:hover::after { content: attr(data-tip); position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); background: #1e1b4b; color: white; padding: 4px 8px; border-radius: 6px; font-size: 0.72rem; white-space: nowrap; pointer-events: none; z-index: 99; }

    /* Nav pill */
    .nav-btn { padding: 8px 16px; border-radius: 999px; font-size: 0.85rem; font-weight: 600; border: 2px solid transparent; cursor: pointer; transition: all 0.18s; }
    .nav-btn.active { background: #4f46e5; color: white; }
    .nav-btn:not(.active) { background: white; color: #374151; border-color: #e5e7eb; }
    .nav-btn:not(.active):hover { border-color: #4f46e5; color: #4f46e5; }
  </style>
</head>

const STORAGE_KEY  = 'fls_stats_v2';
const USER_VOCAB_KEY = 'fls_user_vocab_v2';

function getStats() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } }
function saveStats(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
function getUserVocab() { try { return JSON.parse(localStorage.getItem(USER_VOCAB_KEY) || '[]'); } catch { return []; } }
function saveUserVocab(v) { localStorage.setItem(USER_VOCAB_KEY, JSON.stringify(v)); }

async function saveWordToSupabase(wordObj) {
  const { data, error } = await supabaseClient
    .from('user_vocabulary')
    .insert([
      { 
        french: wordObj.french, 
        lemma: wordObj.lemma, 
        english: wordObj.english, 
        word_type: wordObj.type 
      }
    ]).select();
  
  if (error) {
    console.error("Error saving word:", error);
    return null;
  } else {
    showToast(`"${wordObj.french}" synced to cloud!`);
    return data[0].id; // Return the new UUID
  }
}

async function deleteWordFromSupabase(id, french) {
  if (!confirm(`Are you sure you want to delete "${french}" from your vocabulary?`)) return;
  
  // 1. Remove from local browser memory
  let current = getUserVocab();
  current = current.filter(w => w.id !== id);
  saveUserVocab(current);
  
  // 2. Refresh the sidebar UI instantly
  renderSidebar();
  
  // 3. Delete from Supabase cloud by ID, not string
  if (id) {
    const { error } = await supabaseClient.from('user_vocabulary').delete().eq('id', id);
    if (error) console.error("Error deleting word:", error);
    else showToast(`"${french}" removed!`);
  }
}

function addWordToVocab(entry) {
  const current = getUserVocab();
  const exists = current.some(w => w.french.toLowerCase() === entry.french.toLowerCase());
  if (!exists) { current.push(entry); saveUserVocab(current); return true; }
  return false;
}
function getAllVocab() { return [...BASE_VOCAB, ...getUserVocab()]; }

async function syncStatsFromSupabase() {
  const { data, error } = await supabaseClient.from('user_stats').select('*');
  if (!error && data) {
    let s = {};
    data.forEach(r => s[r.french] = r.mastery_score);
    saveStats(s);
  }
}

async function pushStatToSupabase(frenchWord, newScore) {
  await supabaseClient.from('user_stats').upsert({ french: frenchWord, mastery_score: newScore });
}

function updateWordStat(frenchWord, isCorrect) { 
  if (!isCorrect) return; 
  const s = getStats(); 
  const newScore = (s[frenchWord] || 0) + 1;
  s[frenchWord] = newScore;
  saveStats(s); 
  pushStatToSupabase(frenchWord, newScore); 
}

function resetStats() { 
  if (confirm('Reset progress?')) { 
    localStorage.removeItem(STORAGE_KEY); 
    // Delete from Supabase as well
    supabaseClient.from('user_stats').delete().neq('french', 'none').then(() => {
      showProgress(); 
    });
  } 
}
syncStatsFromSupabase();

let currentDeck = []; let initialDeckSize = 0; let currentCard = null; let currentModuleType = '';
function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }
function getSmartDeck(filterFn, size) {
  const stats = getStats(); const candidates = getAllVocab().filter(filterFn);
  const weighted = candidates.map(w => ({ word: w, sortKey: (stats[w.french] || 0) + Math.random() * 2 }));
  weighted.sort((a, b) => a.sortKey - b.sortKey); return weighted.slice(0, size).map(x => x.word);
}

function createConjugation(verbObj, pronounIndex) {
  const p = PRONOUNS[pronounIndex];
  const englishFront = `${p.en} ${verbObj.english.replace('To ', '')}`;
  
  const irregulars = {
      'Être': ['suis', 'es', 'est', 'sommes', 'êtes', 'sont'],
      'Avoir': ['ai', 'as', 'a', 'avons', 'avez', 'ont'],
      'Aller': ['vais', 'vas', 'va', 'allons', 'allez', 'vont'],
      'Faire': ['fais', 'fais', 'fait', 'faisons', 'faites', 'font']
  };

  if (irregulars[verbObj.french]) {
      const conjugatedForm = irregulars[verbObj.french][pronounIndex];
      let frenchPronoun = p.fr;
      if (p.fr === 'Je' && ['a', 'e', 'i', 'o', 'u', 'y', 'é', 'è'].includes(conjugatedForm[0])) {
           frenchPronoun = "J'";
      }
      const separator = frenchPronoun.endsWith("'") ? "" : " ";
      return { english: englishFront, french: `${frenchPronoun}${separator}${conjugatedForm}` };
  }

  // Strictly enforce that it must end in -er to be conjugated by this engine
  if (!verbObj.french.toLowerCase().endsWith('er')) return null;

  // Regular
  const root = verbObj.french.toLowerCase().replace(/er$/, '');
  let frenchPronoun = p.fr;
  let frenchStem = root;
  let frenchSuffix = p.suffix;
  const vowels = ['a', 'e', 'i', 'o', 'u', 'y', 'é', 'è'];
  if (p.fr === 'Je' && vowels.includes(verbObj.french[0].toLowerCase())) frenchPronoun = "J'";
  if (verbObj.french === 'Manger' && p.fr === 'Nous') { frenchStem = 'mange'; frenchSuffix = 'ons'; }
  if (['Préférer', 'Espérer'].includes(verbObj.french)) {
      if ([0, 1, 2, 5].includes(pronounIndex)) {
          const lastEIndex = frenchStem.lastIndexOf('é');
          if (lastEIndex !== -1) frenchStem = frenchStem.substring(0, lastEIndex) + 'è' + frenchStem.substring(lastEIndex + 1);
      }
  }
  const separator = frenchPronoun.endsWith("'") ? "" : " ";
  const frenchBack = `${frenchPronoun}${separator}${frenchStem}${frenchSuffix}`;
  return { english: englishFront, french: frenchBack };
}

function startModule(type) {
  currentModuleType = type; goTo('quiz');
  document.getElementById('complete-msg').classList.add('hidden');
  document.getElementById('complete-msg').style.display = 'none';
  const title = document.getElementById('q-title');
  
  if (type === 'vocab') {
    title.textContent = "Vocabulary Flashcards";
    currentDeck = getSmartDeck(w => w.type === 'Verbs' || w.type === 'Irregular Verbs' || w.type === 'verb', 20);
    shuffle(currentDeck);
  }
  else if (type === 'nouns') {
    title.textContent = "Common Nouns";
    currentDeck = getSmartDeck(w => w.type === 'Common Nouns' || w.type === 'noun', 20);
    shuffle(currentDeck);
  }
  else if (type === 'conjugation') {
    title.textContent = "Conjugation Practice";
    currentDeck = [];
    const allPossibilities = [];
    const verbsOnly = getAllVocab().filter(w => w.type === 'Verbs' || w.type === 'Irregular Verbs' || w.type === 'verb');
    verbsOnly.forEach(verb => {
        PRONOUNS.forEach((_, index) => {
            const conj = createConjugation(verb, index);
            if (conj) allPossibilities.push(conj);
        });
    });
    shuffle(allPossibilities);
    currentDeck = allPossibilities.slice(0, 15);
  }
  else if (type === 'my-vocab') {
    title.textContent = "My Custom Words";
    currentDeck = getSmartDeck(w => w.source === 'supabase', 20);
    if (currentDeck.length === 0) currentDeck = getSmartDeck(w => true, 20);
    shuffle(currentDeck);
  }
  
  initialDeckSize = currentDeck.length; 
  loadNextCard();
}

function loadNextCard() {
  if (currentDeck.length === 0) { document.getElementById('complete-msg').classList.remove('hidden'); document.getElementById('complete-msg').style.display = 'flex'; return; }
  document.getElementById('q-counter').textContent = `Card ${(initialDeckSize - currentDeck.length) + 1} of ${initialDeckSize}`;
  currentCard = currentDeck[0];
  document.getElementById('card-front-text').textContent = currentCard.english;
  document.getElementById('card-back-text').textContent = currentCard.french;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('reveal-btn').classList.remove('hidden');
  document.getElementById('feedback-btns').classList.add('hidden');
}
function handleFeedback(isCorrect) { 
  document.getElementById('flashcard').classList.remove('flipped'); 
  updateWordStat(currentCard.french, isCorrect);
  setTimeout(() => { 
    if (isCorrect) currentDeck.shift(); 
    else currentDeck.push(currentDeck.shift()); 
    loadNextCard(); 
  }, 550); 
}

let textSessions = [];
let currentSessionId = null;

async function loadSessionsFromStorage() {
  try { textSessions = JSON.parse(localStorage.getItem('fls_text_sessions') || '[]'); } catch { textSessions = []; }
  
  if (textSessions.length === 0) newSession();
  else { updateSessionDropdown(); loadSession(textSessions[0].id); }
  
  // Sync from cloud and override local
  const { data, error } = await supabaseClient.from('text_sessions').select('*').order('updated_at', { ascending: false });
  if (!error && data && data.length > 0) {
    textSessions = data;
    saveSessionsToStorage();
    updateSessionDropdown();
    if (!currentSessionId) loadSession(textSessions[0].id);
  }
}

async function pushSessionToSupabase(sessionObj) {
  await supabaseClient.from('text_sessions').upsert({
    id: sessionObj.id,
    title: sessionObj.title,
    content: sessionObj.content,
    updated_at: new Date().toISOString()
  });
}

function saveSessionsToStorage() {
  localStorage.setItem('fls_text_sessions', JSON.stringify(textSessions));
  updateSessionDropdown();
}

function newSession() {
  const id = Date.now().toString();
  const session = { id: id, title: `Text ${new Date().toLocaleDateString()}`, content: '' };
  textSessions.unshift(session);
  saveSessionsToStorage();
  loadSession(id);
}

function updateSessionDropdown() {
  const select = document.getElementById('session-select');
  select.innerHTML = '';
  textSessions.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id; opt.textContent = s.title;
    if (s.id === currentSessionId) opt.selected = true;
    select.appendChild(opt);
  });
}

function loadSession(id) {
  currentSessionId = id;
  const session = textSessions.find(s => s.id === id);
  if (session) {
    document.getElementById('analyser-editor').innerHTML = session.content;
    document.getElementById('session-select').value = id;
    renderSidebar();
  }
}

function handleEditorInput() {
  saveCurrentSession();
  renderSidebar();
}

let sessionSaveTimeout = null;

function saveCurrentSession() {
  if (!currentSessionId) return;
  const session = textSessions.find(s => s.id === currentSessionId);
  if (session) {
    const editor = document.getElementById('analyser-editor');
    session.content = editor.innerHTML;
    // Auto-update title if it's default
    const text = editor.innerText.trim();
    if (text.length > 0) session.title = text.substring(0, 20) + (text.length > 20 ? '...' : '');
    else session.title = `Text ${new Date().toLocaleDateString()}`;
    saveSessionsToStorage();
    
    // Debounce cloud save to prevent spamming database on every keystroke
    clearTimeout(sessionSaveTimeout);
    sessionSaveTimeout = setTimeout(() => {
      pushSessionToSupabase(session);
    }, 1500);
  }
}

function checkSelection() {
  const sel = window.getSelection();
  // Optional: can show tooltip or enable/disable highlight buttons based on selection
}

function highlightSelection(type, className) {
  const sel = window.getSelection();
  if (!sel.rangeCount || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  const editor = document.getElementById('analyser-editor');
  if (!editor.contains(range.commonAncestorContainer)) return;

  const word = sel.toString().trim();
  if (!word) return;

  const span = document.createElement('span');
  span.className = className;
  span.setAttribute('data-word', word);
  span.setAttribute('data-type', type);
  span.textContent = word;

  range.deleteContents();
  range.insertNode(span);
  
  // Collapse selection after highlight
  sel.removeAllRanges();
  
  saveCurrentSession();
  renderSidebar();
}

function clearHighlights() {
  if (!confirm('Clear all highlights from this text?')) return;
  const editor = document.getElementById('analyser-editor');
  const spans = editor.querySelectorAll('span[data-word]');
  spans.forEach(span => {
    const text = document.createTextNode(span.textContent);
    span.parentNode.replaceChild(text, span);
  });
  saveCurrentSession();
  renderSidebar();
}

function renderSidebar() {
  const editor = document.getElementById('analyser-editor');
  const spans = editor.querySelectorAll('span[data-word]');
  const sidebar = document.getElementById('word-sidebar');
  sidebar.innerHTML = '';

  const groups = { verb: [], noun: [], adverb: [], adjective: [] };
  const uniqueWords = new Set();
  
  spans.forEach(span => {
    const w = span.getAttribute('data-word');
    const t = span.getAttribute('data-type');
    const key = `${w}-${t}`;
    if (!uniqueWords.has(key)) {
      uniqueWords.add(key);
      if (groups[t]) groups[t].push(w);
    }
  });

  const typeLabels = { verb:'Verbs', noun:'Nouns', adverb:'Adverbs', adjective:'Adjectives' };
  const typeColors = {
    verb: { bg:'#ede9fe', color:'#7c3aed', btnBg:'#7c3aed' },
    noun: { bg:'#e0f2fe', color:'#0369a1', btnBg:'#0369a1' },
    adverb: { bg:'#d1fae5', color:'#065f46', btnBg:'#059669' },
    adjective: { bg:'#fef3c7', color:'#92400e', btnBg:'#d97706' }
  };
  
  const savedVocab = getUserVocab();

  let hasWords = false;
  Object.entries(groups).forEach(([type, words]) => {
    if (words.length === 0) return;
    hasWords = true;
    const tc = typeColors[type];
    const header = document.createElement('p');
    header.style.cssText = `font-size:0.7rem;font-weight:700;text-transform:uppercase;color:${tc.color};margin:16px 0 8px;`;
    header.textContent = typeLabels[type];
    sidebar.appendChild(header);

    words.forEach(w => {
      const alreadySaved = savedVocab.find(sv => sv.french === w);
      
      const box = document.createElement('div');
      box.style.cssText = `background:${tc.bg};border:1px solid ${tc.color}40;border-radius:8px;padding:10px;margin-bottom:8px;font-size:0.85rem;`;
      
      if (alreadySaved) {
        // Safe DOM creation
        const topRow = document.createElement('div');
        topRow.style.cssText = 'display:flex;justify-content:space-between;align-items:center;';
        
        const label = document.createElement('div');
        label.style.cssText = `color:${tc.color};font-weight:700;`;
        label.textContent = w;
        
        const controls = document.createElement('div');
        controls.style.cssText = 'display:flex;gap:6px;align-items:center;';
        
        const delBtn = document.createElement('button');
        delBtn.style.cssText = 'color:#ef4444;font-size:1.1rem;line-height:1;padding:0 4px;cursor:pointer;border:none;background:transparent;';
        delBtn.title = 'Delete word';
        delBtn.textContent = '×';
        delBtn.onclick = () => deleteWordFromSupabase(alreadySaved.id, w);
        
        const savedBadge = document.createElement('div');
        savedBadge.style.cssText = 'font-size:0.75rem;color:#4b5563;background:white;padding:2px 6px;border-radius:4px;';
        savedBadge.textContent = 'Saved ✓';
        
        controls.appendChild(delBtn);
        controls.appendChild(savedBadge);
        
        topRow.appendChild(label);
        topRow.appendChild(controls);
        
        const engText = document.createElement('div');
        engText.style.cssText = 'color:#374151;margin-top:4px;';
        engText.textContent = alreadySaved.english;
        
        box.appendChild(topRow);
        box.appendChild(engText);
      } else {
        const deckType = type === 'verb' ? 'verb' : type === 'noun' ? 'noun' : type === 'adverb' ? 'adverb' : 'adjective';
        
        const label = document.createElement('div');
        label.style.cssText = `color:${tc.color};font-weight:700;margin-bottom:6px;`;
        label.textContent = w;
        
        const inputRow = document.createElement('div');
        inputRow.style.cssText = 'display:flex;gap:6px;';
        
        const input = document.createElement('input');
        input.type = 'text';
        input.id = `def-${sanitizeId(w)}`;
        input.placeholder = 'English meaning...';
        input.className = 'flex-1 px-2 py-1.5 rounded-md border-none outline-none text-xs';
        input.style.background = 'white';
        
        const addBtn = document.createElement('button');
        addBtn.className = 'add-btn';
        addBtn.style.cssText = `background:${tc.btnBg};color:white;padding:0 12px;border-radius:6px;font-weight:600;font-size:0.75rem;`;
        addBtn.textContent = 'Save';
        addBtn.onclick = () => addDefinitionFromSidebar(addBtn, w, deckType, input.id);
        
        inputRow.appendChild(input);
        inputRow.appendChild(addBtn);
        
        box.appendChild(label);
        box.appendChild(inputRow);
      }
      sidebar.appendChild(box);
    });
  });
  
  if (!hasWords) {
    sidebar.innerHTML = '<p class="text-sm text-gray-400 text-center mt-8">Highlight a word to start defining it.</p>';
  }
}

async function addDefinitionFromSidebar(btn, french, deckType, inputId) {
  const english = document.getElementById(inputId).value.trim();
  if (!english) return alert("Please enter the English translation.");
  
  const toAdd = { french: french, english: english, lemma: french, type: deckType, source: 'supabase' };
  
  if (addWordToVocab(toAdd)) {
    btn.textContent = '...';
    btn.disabled = true;
    
    // Save to supabase and get the new ID
    const newId = await saveWordToSupabase(toAdd);
    
    if (newId) {
      // Update the local item with the real ID
      let current = getUserVocab();
      let savedItem = current.find(w => w.french === french);
      if (savedItem) savedItem.id = newId;
      saveUserVocab(current);
    }
    
    renderSidebar(); // Re-render to show as saved
  }
}

    btn.onclick = () => openLesson(lesson.id);
    btn.innerHTML = `
        <div><h3 class="font-bold text-indigo-900 text-lg group-hover:text-indigo-800">${lesson.title}</h3><p class="text-sm text-gray-600">${lesson.description}</p></div>
        <span class="text-2xl text-indigo-300 group-hover:translate-x-1 transition">→</span>
    `;
    list.appendChild(btn);
  });
}

function openLesson(id) {
  const lesson = LESSONS.find(l => l.id === id);
  if (!lesson) return;
  goTo('lesson-content');
  document.getElementById('lesson-body').innerHTML = lesson.content;
}
function escapeHtml(str) { return str ? String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
function escapeAttr(str) { return str ? String(str).replace(/'/g,"\\'").replace(/"/g,'\\"') : ''; }
function sanitizeId(str) { return String(str).replace(/[^a-zA-Z0-9]/g,'_'); }

goTo('dashboard');
</script>
</body>
